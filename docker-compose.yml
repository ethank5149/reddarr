services:
  db:
    container_name: reddit_archive_db
    image: postgres:16
    environment:
      POSTGRES_DB: reddit
      POSTGRES_USER: reddit
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reddit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: reddit_archive_redis
    image: redis:7
    volumes:
      - ./redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingester:
    container_name: reddit_archive_ingester
    build: ./ingester
    env_file:
      - .env
    environment:
      DB_URL: postgresql://reddit:${POSTGRES_PASSWORD}@db:5432/reddit
      REDIS_HOST: redis
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT}
      TARGETS_FILE: /app/targets.txt
      ARCHIVE_PATH: ${ARCHIVE_PATH}
      POLL_INTERVAL: ${POLL_INTERVAL:-300}
      SCRAPE_LIMIT: ${SCRAPE_LIMIT:-500}
    secrets:
      - reddit_client_id
      - reddit_client_secret
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ingester:/app
      - ./targets.txt:/app/targets.txt:ro

  downloader:
    container_name: reddit_archive_downloader
    build: ./downloader
    env_file:
      - .env
    environment:
      DB_URL: postgresql://reddit:${POSTGRES_PASSWORD}@db:5432/reddit
      REDIS_HOST: redis
      ARCHIVE_PATH: ${ARCHIVE_PATH}
      THUMB_PATH: ${THUMB_PATH}
      ARCHIVE_MEDIA_PATH: ${ARCHIVE_MEDIA_PATH}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${ARCHIVE_PATH}:${ARCHIVE_PATH}
      - ${THUMB_PATH}:${THUMB_PATH}
      - ${ARCHIVE_MEDIA_PATH}:${ARCHIVE_MEDIA_PATH}
      - ./downloader:/app

  api:
    container_name: reddit_archive_api
    build: ./web
    env_file:
      - .env
    environment:
      DB_URL: postgresql://reddit:${POSTGRES_PASSWORD}@db:5432/reddit
    secrets:
      - api_key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${ARCHIVE_PATH}:${ARCHIVE_PATH}
      - ${THUMB_PATH}:${THUMB_PATH}
      - ${ARCHIVE_MEDIA_PATH}:${ARCHIVE_MEDIA_PATH}
    ports:
      - "${REDDIT_ARCHIVE_API_PORT:-8080}:8080"

  postgres-exporter:
    container_name: reddit_archive_postgres_exporter
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://reddit:${POSTGRES_PASSWORD}@db:5432/reddit?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  redis-exporter:
    container_name: reddit_archive_redis_exporter
    image: oliver006/redis_exporter:latest
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  node-exporter:
    container_name: reddit_archive_node_exporter
    image: prom/node-exporter:latest
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro
    pid: host
    restart: unless-stopped

  prometheus:
    container_name: reddit_archive_prometheus
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/data:/prometheus
    ports:
      - "${REDDIT_ARCHIVE_PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - api
      - ingester
      - downloader
      - postgres-exporter
      - redis-exporter
      - node-exporter
    restart: unless-stopped

  grafana:
    container_name: reddit_archive_grafana
    image: grafana/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/overview.json
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "${REDDIT_ARCHIVE_GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  reddit_client_id:
    file: ./secrets/reddit_client_id
  reddit_client_secret:
    file: ./secrets/reddit_client_secret
  api_key:
    file: ./secrets/api_key