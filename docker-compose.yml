services:
  db:
    container_name: reddit_archive_db
    image: postgres:16
    environment:
      POSTGRES_DB: reddit
      POSTGRES_USER: reddit
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reddit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: reddit_archive_redis
    image: redis:7
    volumes:
      - ./redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingester:
    container_name: reddit_archive_ingester
    build: ./ingester
    environment:
      DB_URL: postgresql://reddit:${POSTGRES_PASSWORD}@db:5432/reddit
      REDIS_HOST: redis
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT}
      REDDIT_TARGET_SUBREDDITS: ${REDDIT_TARGET_SUBREDDITS}
      REDDIT_TARGET_USERS: ${REDDIT_TARGET_USERS}
      ARCHIVE_PATH: ${ARCHIVE_PATH}
      POLL_INTERVAL: ${POLL_INTERVAL:-300}
      SCRAPE_LIMIT: ${SCRAPE_LIMIT:-}
    secrets:
      - reddit_client_id
      - reddit_client_secret
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ingester:/app

  downloader:
    container_name: reddit_archive_downloader
    build: ./downloader
    environment:
      DB_URL: postgresql://reddit:${POSTGRES_PASSWORD}@db:5432/reddit
      REDIS_HOST: redis
      ARCHIVE_PATH: ${ARCHIVE_PATH}
      THUMB_PATH: ${THUMB_PATH}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${ARCHIVE_PATH}:${ARCHIVE_PATH}
      - ${THUMB_PATH}:${THUMB_PATH}
      - ./downloader:/app

  api:
    container_name: reddit_archive_api
    build: ./web
    environment:
      DB_URL: postgresql://reddit:${POSTGRES_PASSWORD}@db:5432/reddit
      REDIS_HOST: redis
      ARCHIVE_PATH: ${ARCHIVE_PATH}
      THUMB_PATH: ${THUMB_PATH}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${ARCHIVE_PATH}:${ARCHIVE_PATH}
      - ${THUMB_PATH}:${THUMB_PATH}
    ports:
      - "${REDDIT_ARCHIVE_API_PORT:-8080}:8080"

  prometheus:
    container_name: reddit_archive_prometheus
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/data:/prometheus
    ports:
      - "${REDDIT_ARCHIVE_PROMETHEUS_PORT:-9090}:9090"

  grafana:
    container_name: reddit_archive_grafana
    image: grafana/grafana
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "${REDDIT_ARCHIVE_GRAFANA_PORT:-3000}:3000"

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  reddit_client_id:
    file: ./secrets/reddit_client_id
  reddit_client_secret:
    file: ./secrets/reddit_client_secret