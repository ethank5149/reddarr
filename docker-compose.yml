# =============================================================================
# Reddarr v2 — Docker Compose
#
# Architecture modeled after TubeArchivist:
#   - Single app image with 3 roles (api, worker, beat)
#   - PostgreSQL for storage
#   - Redis for Celery broker + result backend
#   - Prometheus + Grafana for observability (optional)
#
# Migration from v1:
#   - Replaces separate ingester/downloader/api containers
#   - Replaces targets.txt with DB-driven target management
#   - Replaces raw Redis queue with Celery task dispatch
# =============================================================================

services:
  # --- Core services ---

  db:
    container_name: reddarr_db
    image: postgres:16
    environment:
      POSTGRES_DB: reddit
      POSTGRES_USER: reddit
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reddit"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  redis:
    container_name: reddarr_redis
    image: redis:7
    volumes:
      - ./redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  # --- Application (single image, multiple roles) ---

  api:
    container_name: reddarr_api
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn reddarr.api.app:app --host 0.0.0.0 --port 8080"
    env_file:
      - .env
    environment:
      DB_URL: postgresql://reddit:${POSTGRES_PASSWORD}@db:5432/reddit
      REDIS_HOST: redis
      CONTAINER_ROLE: api
    secrets:
      - postgres_password
      - reddit_client_id
      - reddit_client_secret
      - admin_password
      - guest_password
      - api_key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ${ARCHIVE_PATH:-/mnt/user/Archive/reddit}:${ARCHIVE_PATH:-/mnt/user/Archive/reddit}
      - ${THUMB_PATH:-/mnt/user/Archive/reddit/.thumbs}:${THUMB_PATH:-/mnt/user/Archive/reddit/.thumbs}
      - ${ARCHIVE_MEDIA_PATH:-/mnt/user/Archive/reddit/.archive}:${ARCHIVE_MEDIA_PATH:-/mnt/user/Archive/reddit/.archive}
    ports:
      - "${REDDARR_PORT:-8011}:8080"
    networks:
      - internal
    restart: unless-stopped

  worker:
    container_name: reddarr_worker
    build: .
    command: celery -A reddarr.tasks worker -l info -c 4 -Q default,download,ingest
    env_file:
      - .env
    environment:
      DB_URL: postgresql://reddit:${POSTGRES_PASSWORD}@db:5432/reddit
      REDIS_HOST: redis
      CONTAINER_ROLE: worker
    secrets:
      - postgres_password
      - reddit_client_id
      - reddit_client_secret
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${ARCHIVE_PATH:-/mnt/user/Archive/reddit}:${ARCHIVE_PATH:-/mnt/user/Archive/reddit}
      - ${THUMB_PATH:-/mnt/user/Archive/reddit/.thumbs}:${THUMB_PATH:-/mnt/user/Archive/reddit/.thumbs}
      - ${ARCHIVE_MEDIA_PATH:-/mnt/user/Archive/reddit/.archive}:${ARCHIVE_MEDIA_PATH:-/mnt/user/Archive/reddit/.archive}
    networks:
      - internal
    restart: unless-stopped

  beat:
    container_name: reddarr_beat
    build: .
    command: celery -A reddarr.tasks beat -l info
    env_file:
      - .env
    environment:
      DB_URL: postgresql://reddit:${POSTGRES_PASSWORD}@db:5432/reddit
      CONTAINER_ROLE: beat
      REDIS_HOST: redis
    secrets:
      - postgres_password
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # --- Observability (optional — remove if not needed) ---

  prometheus:
    container_name: reddarr_prometheus
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - api
    networks:
      - internal
    restart: unless-stopped

  grafana:
    container_name: reddarr_grafana
    image: grafana/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/overview.json
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - internal
    restart: unless-stopped

  # --- Optional: Celery Flower for task monitoring ---
  # Uncomment to enable web-based task monitoring at port 5555
  #
  # flower:
  #   container_name: reddarr_flower
  #   build: .
  #   command: celery -A reddarr.tasks flower --port=5555
  #   environment:
  #     DB_URL: postgresql://reddit:${POSTGRES_PASSWORD}@db:5432/reddit
  #     REDIS_HOST: redis
  #   depends_on:
  #     - redis
  #   ports:
  #     - "5555:5555"
  #   networks:
  #     - internal
  #   restart: unless-stopped

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  reddit_client_id:
    file: ./secrets/reddit_client_id
  reddit_client_secret:
    file: ./secrets/reddit_client_secret
  admin_password:
    file: ./secrets/admin_password
  guest_password:
    file: ./secrets/guest_password
  api_key:
    file: ./secrets/api_key

networks:
  internal:
    driver: bridge
