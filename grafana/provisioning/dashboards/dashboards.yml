apiVersion: 1

providers:
  - name: reddit-archive
    orgId: 1
    folder: Reddit Archive
    folderUid: reddit-archive
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
